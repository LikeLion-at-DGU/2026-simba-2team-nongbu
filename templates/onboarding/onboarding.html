{% load static %}
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온보딩</title>
    <link rel="stylesheet" href="{% static 'css/onboarding/onboarding.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/primary_button.css' %}">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">

</head>

<body>
    <div class="mobile-wrap">
        <div class="main">
            <div class="onboarding-container">
                <section class="onboarding-page page-1">
                    <div class="elements">
                        <div class="text-1">
                            <div class="skip-frame">
                                <a href="{% url 'onboarding_start' %}">
                                    <p class="skip-text">Skip</p>
                                </a>
                            </div>
                            <div class="large-title">
                                <p>흩어진 별조각을 모아, 우리들만의<br>별자리를 완성하다.</p>
                            </div>
                        </div>
                        <button class="primary-btn next-btn">다음</button>
                    </div>
                </section>
                <section class="onboarding-page page-2">
                    <div class="elements">
                        <div class="text-2">
                            <div class="large-title">
                                <p>기록들이<br>선으로 이어지면,<br>밤하늘에 우리의<br>시간이 그려집니다.</p>
                            </div>
                        </div>
                        <button class="primary-btn next-btn">다음</button>
                    </div>
                </section>
                <section class="onboarding-page page-3">
                    <div class="text-3">
                        <div class="large-title">
                            <p>지금, 첫 별조각을<br>새겨볼까요?</p>
                        </div>
                    </div>
                    <button class="primary-btn start-btn">시작하기</button>
                </section>
            </div>    
        </div>
    </div>
    <script src="{% static 'js/onboarding.js' %}"></script>
</body>

</html>
